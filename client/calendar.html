<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender - StudyTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-gray-200">
            <img src="assets/images/logo.png" alt="StudyTracker" class="h-12 object-contain">
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-home w-5 mr-3"></i> Dashboard
            </a>
            <a href="task.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-tasks w-5 mr-3"></i> Daftar Tugas
            </a>
            <a href="calendar.html" class="flex items-center px-3 py-2.5 bg-indigo-50 text-indigo-700 rounded-lg font-medium">
                <i class="fas fa-calendar-alt w-5 mr-3"></i> Kalender
            </a>
            <a href="focus.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-stopwatch w-5 mr-3"></i> Focus Mode
            </a>
            <a href="stats.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-chart-pie w-5 mr-3"></i> Statistik
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <button onclick="doLogout()" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                <i class="fas fa-sign-out-alt w-5 mr-3"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
            <h2 class="text-xl font-semibold text-gray-800">StudyTracker</h2>
            <div class="flex items-center space-x-4">
                <button class="text-gray-500 hover:text-indigo-600"><i class="fas fa-bell text-xl"></i></button>
                <div class="w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-sm user-initial">U</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 fade-in">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800" id="cal-title">-</h2>
                        <p class="text-gray-500 text-sm">Pantau jadwal dan deadline akademismu.</p>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="prevMonth()" class="p-2 border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="goToday()" class="px-4 py-2 bg-indigo-50 text-indigo-700 font-medium rounded-lg hover:bg-indigo-100">Hari Ini</button>
                        <button onclick="nextMonth()" class="p-2 border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-7 gap-1 text-center font-semibold text-gray-600 text-sm py-2 mb-1">
                    <div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div>
                    <div class="text-red-500">Sab</div><div class="text-red-500">Min</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-sm">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        let viewYear, viewMonth;
        let allTasks = [];

        const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

        document.addEventListener('DOMContentLoaded', async () => {
            initUserHeader();
            const now = new Date();
            viewYear = now.getFullYear();
            viewMonth = now.getMonth();
            allTasks = await api.getTasks().catch(() => []);
            renderCalendar();
        });

        function renderCalendar() {
            document.getElementById('cal-title').textContent = `${BULAN[viewMonth]} ${viewYear}`;

            const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
            // Konversi: Senin=0, ..., Minggu=6
            const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
            const prevDays = new Date(viewYear, viewMonth, 0).getDate();

            const today = new Date();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Buat map tugas per tanggal
            const taskMap = {};
            allTasks.forEach(t => {
                const d = new Date(t.deadline);
                if (d.getFullYear() === viewYear && d.getMonth() === viewMonth) {
                    const day = d.getDate();
                    if (!taskMap[day]) taskMap[day] = [];
                    taskMap[day].push(t);
                }
            });

            // Hari sebelumnya (disabled)
            for (let i = startOffset - 1; i >= 0; i--) {
                const cell = document.createElement('div');
                cell.className = 'min-h-[80px] p-2 border border-gray-100 rounded-lg bg-gray-50 text-gray-400 text-xs';
                cell.textContent = prevDays - i;
                grid.appendChild(cell);
            }

            // Hari bulan ini
            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                const isToday = d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
                const dayOfWeek = new Date(viewYear, viewMonth, d).getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

                cell.className = `min-h-[80px] p-2 border rounded-lg transition-shadow cursor-default ${
                    isToday ? 'border-indigo-500 bg-indigo-50 shadow-sm font-bold text-indigo-700' :
                    'border-gray-200 hover:shadow-md ' + (isWeekend ? 'text-red-500' : '')
                }`;

                let html = `<div class="font-semibold mb-1">${d}</div>`;
                if (taskMap[d]) {
                    taskMap[d].slice(0, 2).forEach(t => {
                        const color = t.prioritas === 'high' ? 'bg-red-100 text-red-700' :
                                      t.prioritas === 'medium' ? 'bg-yellow-100 text-yellow-700' :
                                      'bg-green-100 text-green-700';
                        const time = new Date(t.deadline).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                        html += `<div class="text-xs ${color} px-1 py-0.5 rounded truncate mb-0.5" title="${t.judul}">${time} ${t.judul}</div>`;
                    });
                    if (taskMap[d].length > 2) {
                        html += `<div class="text-xs text-gray-400">+${taskMap[d].length - 2} lagi</div>`;
                    }
                }

                cell.innerHTML = html;
                grid.appendChild(cell);
            }

            // Sisa sel kosong
            const totalCells = grid.children.length;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remaining; i++) {
                const cell = document.createElement('div');
                cell.className = 'min-h-[80px] p-2 border border-gray-100 rounded-lg bg-gray-50 text-gray-400 text-xs';
                cell.textContent = i;
                grid.appendChild(cell);
            }
        }

        function prevMonth() {
            viewMonth--;
            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
            renderCalendar();
        }

        function nextMonth() {
            viewMonth++;
            if (viewMonth > 11) { viewMonth = 0; viewYear++; }
            renderCalendar();
        }

        function goToday() {
            const now = new Date();
            viewYear = now.getFullYear();
            viewMonth = now.getMonth();
            renderCalendar();
        }

        function doLogout() {
            localStorage.removeItem('st_token');
            localStorage.removeItem('st_user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
