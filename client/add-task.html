<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Tugas - StudyTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 flex h-screen overflow-hidden">

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div class="flex-1 overflow-y-auto p-6 flex justify-center fade-in">
            <div class="w-full max-w-2xl bg-white rounded-xl shadow-sm border border-gray-100 p-8 h-fit">
                <div class="flex items-center mb-6 border-b border-gray-100 pb-4">
                    <a href="task.html" class="text-gray-500 hover:text-indigo-600 mr-4"><i class="fas fa-arrow-left text-xl"></i></a>
                    <h2 class="text-2xl font-bold text-gray-800">Buat Tugas Baru</h2>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Judul Tugas</label>
                        <input type="text" id="t-judul" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="Contoh: Makalah Bab 1">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mata Kuliah</label>
                            <input type="text" id="t-matkul" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="Pilih atau ketik matkul">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Prioritas</label>
                            <select id="t-prioritas" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white">
                                <option value="low">Rendah</option>
                                <option value="medium" selected>Sedang</option>
                                <option value="high">Tinggi</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Batas Waktu (Deadline)</label>
                        <input type="datetime-local" id="t-deadline" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-gray-600">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi Tambahan</label>
                        <textarea id="t-deskripsi" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none" placeholder="Catatan, referensi link, atau instruksi tugas..."></textarea>
                    </div>

                    <p id="task-error" class="text-red-500 text-sm hidden"></p>

                    <div class="pt-4 flex justify-end gap-3 border-t border-gray-100">
                        <a href="task.html" class="px-6 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition-colors">Batal</a>
                        <button onclick="saveTask()" id="save-btn" class="px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors">Simpan Tugas</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        async function saveTask() {
            const judul = document.getElementById('t-judul').value.trim();
            const mata_kuliah = document.getElementById('t-matkul').value.trim();
            const prioritas = document.getElementById('t-prioritas').value;
            const deadline = document.getElementById('t-deadline').value;
            const deskripsi = document.getElementById('t-deskripsi').value.trim();
            const errEl = document.getElementById('task-error');
            const btn = document.getElementById('save-btn');

            errEl.classList.add('hidden');

            if (!judul || !mata_kuliah || !deadline) {
                errEl.textContent = 'Judul, mata kuliah, dan deadline wajib diisi.';
                errEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            try {
                await api.createTask({ judul, mata_kuliah, prioritas, deadline, deskripsi });
                showToast('Tugas berhasil disimpan!');
                setTimeout(() => window.location.href = 'task.html', 800);
            } catch (e) {
                errEl.textContent = e.message || 'Gagal menyimpan tugas.';
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Simpan Tugas';
            }
        }
    </script>
</body>
</html>
