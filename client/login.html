<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-8">
                <img src="assets/images/logo.png" alt="StudyTracker Logo" class="h-32 mx-auto mb-4 object-contain drop-shadow-sm">
                <p class="text-gray-500">Selamat datang kembali! Silakan masuk ke akunmu.</p>
            </div>

            <!-- Form Login -->
            <div id="form-login">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="login-email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="email@student.bakrie.ac.id">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-gray-700">Password</label>
                            <button type="button" onclick="showForgot()" class="text-sm text-indigo-600 hover:text-indigo-800">Lupa password?</button>
                        </div>
                        <input type="password" id="login-password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="••••••••">
                    </div>
                    <p id="login-error" class="text-red-500 text-sm hidden"></p>
                    <button onclick="doLogin()" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
                        Masuk
                    </button>
                </div>
                <p class="mt-6 text-center text-sm text-gray-600">
                    Belum punya akun? <a href="register.html" class="text-indigo-600 font-semibold hover:underline">Daftar sekarang</a>
                </p>
            </div>

            <!-- Form Lupa Password -->
            <div id="form-forgot" class="hidden">
                <div id="step-email" class="space-y-5">
                    <div>
                        <p class="text-sm text-gray-500 mb-4">Masukkan email kamu yang sudah terdaftar untuk mereset password.</p>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Terdaftar</label>
                        <input type="email" id="forgot-email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="email@student.bakrie.ac.id">
                    </div>
                    <p id="forgot-error" class="text-red-500 text-sm hidden"></p>
                    <button onclick="checkForgotEmail()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
                        Verifikasi Email
                    </button>
                </div>

                <div id="step-reset" class="space-y-5 hidden">
                    <div>
                        <p class="text-sm text-green-600 mb-4 font-medium">✓ Email valid. Buat password baru kamu.</p>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
                        <input type="password" id="reset-pw" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="Minimal 8 karakter">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
                        <input type="password" id="reset-pw-confirm" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="Ulangi password baru">
                    </div>
                    <p id="reset-error" class="text-red-500 text-sm hidden"></p>
                    <button onclick="doReset()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
                        Reset Password
                    </button>
                </div>

                <button onclick="showLogin()" class="mt-4 text-sm text-indigo-600 hover:underline">← Kembali ke Login</button>
            </div>
        </div>
    </div>

    <script>
        // Jika sudah login, redirect ke dashboard
        if (localStorage.getItem('st_token')) window.location.href = 'index.html';

        const BASE_URL = window.ST_BASE_URL || 'https://studytracker-server-production.up.railway.app';
        let forgotEmail = '';

        function showForgot() {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-forgot').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('form-login').classList.remove('hidden');
            document.getElementById('form-forgot').classList.add('hidden');
            document.getElementById('step-email').classList.remove('hidden');
            document.getElementById('step-reset').classList.add('hidden');
        }

        async function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            if (!email || !password) {
                errEl.textContent = 'Email dan password wajib diisi.';
                errEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const res = await fetch(`${BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.message || 'Email atau password salah.';
                    errEl.classList.remove('hidden');
                } else {
                    localStorage.setItem('st_token', data.token);
                    localStorage.setItem('st_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                }
            } catch (e) {
                errEl.textContent = 'Tidak bisa terhubung ke server. Coba lagi.';
                errEl.classList.remove('hidden');
            }

            btn.disabled = false;
            btn.textContent = 'Masuk';
        }

        async function checkForgotEmail() {
            const email = document.getElementById('forgot-email').value.trim();
            const errEl = document.getElementById('forgot-error');

            if (!email) {
                errEl.textContent = 'Email wajib diisi.';
                errEl.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/api/auth/check-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok || !data.valid) {
                    errEl.textContent = data.message || 'Email tidak ditemukan.';
                    errEl.classList.remove('hidden');
                } else {
                    forgotEmail = email;
                    errEl.classList.add('hidden');
                    document.getElementById('step-email').classList.add('hidden');
                    document.getElementById('step-reset').classList.remove('hidden');
                }
            } catch (e) {
                errEl.textContent = 'Tidak bisa terhubung ke server.';
                errEl.classList.remove('hidden');
            }
        }

        async function doReset() {
            const pw = document.getElementById('reset-pw').value;
            const confirm = document.getElementById('reset-pw-confirm').value;
            const errEl = document.getElementById('reset-error');

            if (pw.length < 8) {
                errEl.textContent = 'Password minimal 8 karakter.';
                errEl.classList.remove('hidden');
                return;
            }
            if (pw !== confirm) {
                errEl.textContent = 'Password dan konfirmasi tidak sama.';
                errEl.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: forgotEmail, new_password: pw })
                });
                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.message;
                    errEl.classList.remove('hidden');
                } else {
                    alert('Password berhasil direset! Silakan login dengan password baru.');
                    showLogin();
                }
            } catch (e) {
                errEl.textContent = 'Tidak bisa terhubung ke server.';
                errEl.classList.remove('hidden');
            }
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('form-login').classList.contains('hidden')) doLogin();
            }
        });
    </script>
</body>
</html>
