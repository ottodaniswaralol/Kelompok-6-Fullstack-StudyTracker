<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode - StudyTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-gray-200">
            <img src="assets/images/logo.png" alt="StudyTracker" class="h-12 object-contain">
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-home w-5 mr-3"></i> Dashboard
            </a>
            <a href="task.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-tasks w-5 mr-3"></i> Daftar Tugas
            </a>
            <a href="calendar.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-calendar-alt w-5 mr-3"></i> Kalender
            </a>
            <a href="focus.html" class="flex items-center px-3 py-2.5 bg-indigo-50 text-indigo-700 rounded-lg font-medium">
                <i class="fas fa-stopwatch w-5 mr-3"></i> Focus Mode
            </a>
            <a href="stats.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-chart-pie w-5 mr-3"></i> Statistik
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <button onclick="doLogout()" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                <i class="fas fa-sign-out-alt w-5 mr-3"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
            <h2 class="text-xl font-semibold text-gray-800">StudyTracker</h2>
            <div class="flex items-center space-x-4">
                <button class="text-gray-500 hover:text-indigo-600"><i class="fas fa-bell text-xl"></i></button>
                <div class="w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-sm user-initial">U</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 flex items-center justify-center fade-in">
            <div class="text-center w-full max-w-lg">

                <!-- Mode Selector -->
                <div class="flex justify-center gap-3 mb-8">
                    <button onclick="setMode('pomodoro')" id="btn-pomodoro" class="px-5 py-2 rounded-full font-semibold text-sm bg-indigo-600 text-white shadow-md transition-all">Pomodoro (25m)</button>
                    <button onclick="setMode('short_break')" id="btn-short_break" class="px-5 py-2 rounded-full font-semibold text-sm bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-all">Short Break (5m)</button>
                    <button onclick="setMode('long_break')" id="btn-long_break" class="px-5 py-2 rounded-full font-semibold text-sm bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-all">Long Break (15m)</button>
                </div>

                <!-- Task Selector -->
                <div class="mb-8 bg-white p-3 rounded-full shadow-sm border border-gray-200 inline-flex items-center px-6 min-w-[280px]">
                    <span class="text-gray-500 mr-3 text-sm">Fokus pada:</span>
                    <select id="task-select" class="bg-transparent font-semibold text-indigo-600 focus:outline-none cursor-pointer text-sm flex-1">
                        <option value="">-- Pilih Tugas --</option>
                    </select>
                </div>

                <!-- Timer Display -->
                <div class="bg-white rounded-[3rem] shadow-sm border border-gray-100 p-12 mb-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-gray-100">
                        <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-1000" style="width:100%"></div>
                    </div>
                    <h1 class="text-8xl font-black text-gray-800 tracking-tighter mb-2" id="timer">25:00</h1>
                    <p class="text-gray-500 font-medium tracking-widest uppercase text-sm" id="mode-label">Sesi Belajar</p>
                </div>

                <!-- Controls -->
                <div class="flex justify-center gap-4">
                    <button onclick="resetTimer()" class="w-16 h-16 rounded-full bg-white border border-gray-200 text-gray-600 shadow-sm hover:bg-gray-50 hover:text-indigo-600 flex items-center justify-center text-xl transition-all">
                        <i class="fas fa-undo"></i>
                    </button>
                    <button onclick="toggleTimer()" id="main-btn" class="px-10 h-16 rounded-full bg-indigo-600 text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700 font-bold text-lg flex items-center gap-3 transition-all">
                        <i class="fas fa-play"></i> <span id="btn-label">Mulai Fokus</span>
                    </button>
                    <div class="w-16 h-16"></div>
                </div>

                <p id="session-done" class="mt-6 text-green-600 font-semibold hidden">✅ Sesi selesai! Waktu istirahat.</p>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        const MODES = {
            pomodoro:    { label: 'Sesi Belajar',   secs: 25 * 60 },
            short_break: { label: 'Short Break',     secs: 5  * 60 },
            long_break:  { label: 'Long Break',      secs: 15 * 60 },
        };

        let currentMode = 'pomodoro';
        let totalSecs = MODES.pomodoro.secs;
        let remainingSecs = totalSecs;
        let interval = null;
        let running = false;
        let startedAt = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initUserHeader();
            await loadPendingTasks();
        });

        async function loadPendingTasks() {
            try {
                const tasks = await api.getTasks('pending');
                const sel = document.getElementById('task-select');
                sel.innerHTML = '<option value="">-- Pilih Tugas --</option>' +
                    tasks.map(t => `<option value="${t.id}">${t.judul}</option>`).join('');
            } catch (e) { console.error(e); }
        }

        function setMode(mode) {
            if (running) return; // jangan ganti mode saat running
            currentMode = mode;
            totalSecs = MODES[mode].secs;
            remainingSecs = totalSecs;
            updateDisplay();

            ['pomodoro','short_break','long_break'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                btn.className = m === mode
                    ? 'px-5 py-2 rounded-full font-semibold text-sm bg-indigo-600 text-white shadow-md transition-all'
                    : 'px-5 py-2 rounded-full font-semibold text-sm bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-all';
            });

            document.getElementById('mode-label').textContent = MODES[mode].label;
            document.getElementById('session-done').classList.add('hidden');
        }

        function toggleTimer() {
            if (!running) {
                startTimer();
            } else {
                stopTimer();
            }
        }

        function startTimer() {
            running = true;
            startedAt = new Date();
            document.getElementById('btn-label').textContent = 'Berhenti Fokus';
            document.querySelector('#main-btn i').className = 'fas fa-stop';

            interval = setInterval(() => {
                remainingSecs--;
                updateDisplay();

                if (remainingSecs <= 0) {
                    clearInterval(interval);
                    running = false;
                    onSessionComplete(true);
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(interval);
            running = false;
            const elapsed = startedAt ? Math.floor((new Date() - startedAt) / 60000) : 0;
            document.getElementById('btn-label').textContent = 'Mulai Fokus';
            document.querySelector('#main-btn i').className = 'fas fa-play';

            if (elapsed > 0) {
                const taskId = document.getElementById('task-select').value || null;
                api.saveFocusSession({
                    task_id: taskId,
                    tipe: currentMode,
                    durasi_menit: elapsed,
                    selesai: false
                }).catch(() => {});
            }
        }

        function resetTimer() {
            clearInterval(interval);
            running = false;
            remainingSecs = MODES[currentMode].secs;
            document.getElementById('btn-label').textContent = 'Mulai Fokus';
            document.querySelector('#main-btn i').className = 'fas fa-play';
            document.getElementById('session-done').classList.add('hidden');
            updateDisplay();
        }

        function onSessionComplete(selesai) {
            document.getElementById('btn-label').textContent = 'Mulai Fokus';
            document.querySelector('#main-btn i').className = 'fas fa-play';
            document.getElementById('session-done').classList.remove('hidden');

            const taskId = document.getElementById('task-select').value || null;
            const durasi = Math.round(MODES[currentMode].secs / 60);
            api.saveFocusSession({ task_id: taskId, tipe: currentMode, durasi_menit: durasi, selesai }).catch(() => {});

            // notif browser
            if (Notification.permission === 'granted') {
                new Notification('StudyTracker', { body: `${MODES[currentMode].label} selesai! 🎉` });
            }
        }

        function updateDisplay() {
            const m = String(Math.floor(remainingSecs / 60)).padStart(2, '0');
            const s = String(remainingSecs % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
            const pct = (remainingSecs / totalSecs) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        // Minta izin notif
        if (Notification.permission === 'default') Notification.requestPermission();

        function doLogout() {
            localStorage.removeItem('st_token');
            localStorage.removeItem('st_user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
