<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik - StudyTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-gray-200">
            <img src="assets/images/logo.png" alt="StudyTracker" class="h-12 object-contain">
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-home w-5 mr-3"></i> Dashboard
            </a>
            <a href="task.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-tasks w-5 mr-3"></i> Daftar Tugas
            </a>
            <a href="calendar.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-calendar-alt w-5 mr-3"></i> Kalender
            </a>
            <a href="focus.html" class="flex items-center px-3 py-2.5 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors">
                <i class="fas fa-stopwatch w-5 mr-3"></i> Focus Mode
            </a>
            <a href="stats.html" class="flex items-center px-3 py-2.5 bg-indigo-50 text-indigo-700 rounded-lg font-medium">
                <i class="fas fa-chart-pie w-5 mr-3"></i> Statistik
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <button onclick="doLogout()" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                <i class="fas fa-sign-out-alt w-5 mr-3"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
            <h2 class="text-xl font-semibold text-gray-800">StudyTracker</h2>
            <div class="flex items-center space-x-4">
                <button class="text-gray-500 hover:text-indigo-600"><i class="fas fa-bell text-xl"></i></button>
                <div class="w-8 h-8 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-sm user-initial">U</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Statistik Produktivitas</h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500 font-medium mb-1">Total Tugas Selesai</p>
                    <div class="flex items-end gap-3">
                        <h3 class="text-4xl font-bold text-gray-800" id="stat-selesai">-</h3>
                        <span class="text-sm font-medium" id="stat-pct">-</span>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500 font-medium mb-1">Total Jam Belajar</p>
                    <div class="flex items-end gap-3">
                        <h3 class="text-4xl font-bold text-gray-800" id="stat-jam">-<span class="text-xl">j</span></h3>
                        <span class="text-sm text-gray-400 font-medium">Minggu ini</span>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500 font-medium mb-1">Rata-rata Fokus</p>
                    <div class="flex items-end gap-3">
                        <h3 class="text-4xl font-bold text-gray-800" id="stat-fokus">-%</h3>
                        <span class="text-sm text-indigo-500 font-medium" id="stat-kategori">-</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 mb-4">Grafik Jam Belajar (7 Hari Terakhir)</h3>
                <div class="w-full h-72">
                    <canvas id="studyChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        let chart = null;

        document.addEventListener('DOMContentLoaded', async () => {
            initUserHeader();
            await loadStats();
        });

        async function loadStats() {
            try {
                const data = await api.getFocusStats();

                document.getElementById('stat-selesai').textContent = data.total_tugas_selesai;
                document.getElementById('stat-fokus').textContent = data.rata_rata_fokus + '%';
                document.getElementById('stat-kategori').textContent = data.kategori_fokus;

                const jam = data.total_jam_minggu;
                document.getElementById('stat-jam').innerHTML = `${jam}<span class="text-xl">j</span>`;

                const pct = data.persen_kenaikan;
                const pctEl = document.getElementById('stat-pct');
                if (pct > 0) {
                    pctEl.textContent = `↑ ${pct}% bulan ini`;
                    pctEl.className = 'text-sm font-medium text-green-500';
                } else if (pct < 0) {
                    pctEl.textContent = `↓ ${Math.abs(pct)}% bulan ini`;
                    pctEl.className = 'text-sm font-medium text-red-500';
                } else {
                    pctEl.textContent = 'Bulan ini';
                    pctEl.className = 'text-sm font-medium text-gray-400';
                }

                const HARI = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
                const labels = data.chart_7_hari.map(d => {
                    const date = new Date(d.tanggal);
                    return HARI[date.getDay()];
                });
                const values = data.chart_7_hari.map(d => d.jam);

                const ctx = document.getElementById('studyChart').getContext('2d');
                if (chart) chart.destroy();
                chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Jam Belajar',
                            data: values,
                            backgroundColor: 'rgba(79, 70, 229, 0.8)',
                            borderRadius: 6,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { beginAtZero: true, grid: { color: '#f3f4f6' }, title: { display: true, text: 'Jam' } },
                            x: { grid: { display: false } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });

            } catch (e) {
                console.error('Stats error:', e);
            }
        }

        function doLogout() {
            localStorage.removeItem('st_token');
            localStorage.removeItem('st_user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
